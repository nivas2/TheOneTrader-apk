version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: theonetrade-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: theonetrade

  redis:
    image: redis:7-alpine
    container_name: theonetrade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
