name: Build Expo APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
      - '.github/workflows/build-expo-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @theonetrade/shared-types build

      - name: Create mobile .env
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_API_URL=https://theonetrade.in/api/v1" > .env
          echo "EXPO_PUBLIC_SOCKET_URL=https://theonetrade.in" >> .env

      - name: Create google-services.json placeholder
        working-directory: apps/mobile
        run: |
          cat > google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "theonetrade-placeholder",
              "storage_bucket": "theonetrade-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.theonetrade.app" }
              },
              "api_key": [{ "current_key": "placeholder" }]
            }],
            "configuration_version": "1"
          }
          GSEOF

      - name: Expo prebuild Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Find and rename APK
        run: |
          mkdir -p artifacts
          APK=$(find apps/mobile/android -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            echo "No release APK found, trying debug..."
            APK=$(find apps/mobile/android -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          cp "$APK" artifacts/TheOneTrade.apk
          echo "APK: $APK"
          ls -lh artifacts/TheOneTrade.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheOneTrade-Expo-APK
          path: artifacts/TheOneTrade.apk
          retention-days: 90
