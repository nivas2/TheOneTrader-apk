name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/native-android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms and build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK
        working-directory: apps/native-android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Find and rename APK
        run: |
          mkdir -p artifacts
          APK=$(find apps/native-android -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No release APK found!"
            find apps/native-android -name "*.apk" 2>/dev/null
            exit 1
          fi
          cp "$APK" artifacts/TheOneTrade.apk
          echo "APK: $APK"
          ls -lh artifacts/TheOneTrade.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheOneTrade-APK
          path: artifacts/TheOneTrade.apk
          retention-days: 90
